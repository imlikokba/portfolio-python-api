<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imlikokba Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-animation"></div>

    <button onclick="toggleDarkMode()" class="btn toggle-btn">
        🌙 Dark Mode
    </button>

    <div id="main-card" class="card">
        <p>Loading...</p>
    </div>

<script>
async function loadData() {
    try {

        const res = await fetch("https://portfolio-python-api-oh2g.onrender.com");
        const data = await res.json();

        const card = document.getElementById("main-card");

        let skillsHTML = "";
        let skillsArray = data.skills.split(",");

        for (let skill of skillsArray) {
            skillsHTML += `<li>${skill.trim()}</li>`;
        }

        card.innerHTML = `
            <img src="img.png" class="profile-img">

            <h1>${data.name}</h1>

            <h3>${data.title}</h3>

            <p>${data.bio}</p>

            <p>
                📧 <a href="mailto:${data.email}">
                ${data.email}
                </a>
            </p>

            <p>
                <a href="${data.github}" target="_blank" class="btn">
                    GitHub Profile
                </a>
            </p>

            <ul class="skills">
                ${skillsHTML}
            </ul>
        `;
    }
    catch(error){

        console.error(error);

        document.getElementById("main-card").innerHTML =
        "<h2>Failed to load portfolio data.</h2>";
    }
}

function toggleDarkMode(){
    document.body.classList.toggle("dark");
}

loadData();
</script>

</body>
</html>
