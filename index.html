<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imlikokba Portfolio</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg-animation"></div>

<button onclick="toggleDarkMode()" class="btn toggle-btn">
    🌙 Dark Mode
</button>

<div id="main-card" class="card">
    <p>Loading Portfolio...</p>
</div>

<script>

async function loadData() {

    try {

        const res = await fetch(
            "https://portfolio-python-api-oh2g.onrender.com"
        );

        const data = await res.json();

        const skillsHTML = data.skills
            .split(",")
            .map(skill => `<li>${skill.trim()}</li>`)
            .join("");

        document.getElementById("main-card").innerHTML = `
            <img src="img.png" class="profile-img">

            <h1>${data.name}</h1>

            <h3>${data.title}</h3>

            <p class="bio">${data.bio}</p>

            <div class="contact">
                <a href="mailto:${data.email}">
                    📧 ${data.email}
                </a>
            </div>

            <div class="buttons">
                <a href="${data.github}" target="_blank" class="btn">
                    GitHub Profile
                </a>
            </div>

            <h4>Skills</h4>

            <ul class="skills">
                ${skillsHTML}
            </ul>
        `;

    } catch(error) {

        console.error(error);

        document.getElementById("main-card").innerHTML = `
            <h2>Failed to load portfolio data.</h2>
        `;
    }
}

function toggleDarkMode() {

    document.body.classList.toggle("dark");

    const btn = document.querySelector(".toggle-btn");

    if(document.body.classList.contains("dark")) {
        btn.innerHTML = "☀️ Light Mode";
    } else {
        btn.innerHTML = "🌙 Dark Mode";
    }
}

loadData();

</script>

</body>
</html>
