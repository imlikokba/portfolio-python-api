<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

  
    <video autoplay muted loop playsinline id="bg-video">
        <source src="background.mp4" type="video/mp4">
    </video>

   
    <button onclick="toggleDarkMode()" class="btn toggle-btn">
        🌙 Dark Mode
    </button>

    <div id="main-card" class="card">
        <p>Loading...</p>
    </div>

<script>
async function loadData() {
    try {
        const res = await fetch("http://127.0.0.1:8000");
        const data = await res.json();

        const card = document.getElementById("main-card");

        let skillsHTML = "";
        let skillsArray = data.skills.split(",");

        for (let s of skillsArray) {
            skillsHTML += `<li>${s.trim()}</li>`;
        }

        card.innerHTML = `
            <img src="img.png" class="profile-img">

            <h1>${data.name}</h1>

            <h3>${data.title}</h3>

            <p>${data.bio}</p>

            <p>Email:
                <a href="mailto:${data.email}">
                    ${data.email}
                </a>
            </p>

            <p>
                <a href="${data.github}" target="_blank" class="btn">
                    GitHub Profile
                </a>
            </p>

            <ul class="skills">
                ${skillsHTML}
            </ul>
        `;
    }
    catch(err){
        console.log(err);

        document.getElementById("main-card").innerHTML =
        "<h2>Failed to load API data.</h2>";
    }
}

function toggleDarkMode(){
    document.body.classList.toggle("dark");
}

loadData();
</script>

</body>
</html>
